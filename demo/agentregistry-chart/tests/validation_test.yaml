suite: Validation
templates:
  - validate.yaml

tests:
  # ── JWT key validation ───────────────────────────────────────────────────────

  - it: renders nothing when bundled is enabled and jwtPrivateKey is set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when jwtPrivateKey and database.postgres.url are set (bundled disabled)
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.postgres.bundled.enabled: false
      database.postgres.url: "postgres://user:pass@host:5432/db"
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when config.existingSecret is set (bundled disabled)
    set:
      config.existingSecret: my-existing-secret
      database.postgres.bundled.enabled: false
      database.postgres.url: "postgres://user:pass@host:5432/db"
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when jwtPrivateKey is empty and no existingSecret is provided
    set:
      database.postgres.bundled.enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "CHART CONFIGURATION ERROR"

  - it: fails when jwtPrivateKey is not a valid hex string
    set:
      config.jwtPrivateKey: "not-hex!!"
    asserts:
      - failedTemplate:
          errorPattern: "CHART CONFIGURATION ERROR"

  # ── Bundled PostgreSQL skips external validation ──────────────────────────

  - it: renders nothing with bundled enabled even when no url
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
    asserts:
      - hasDocuments:
          count: 0

  # ── Database URL validation (bundled disabled) ────────────────────────────

  - it: fails when bundled is disabled and url is not set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.postgres.bundled.enabled: false
    asserts:
      - failedTemplate:
          errorPattern: "CHART CONFIGURATION ERROR"

  - it: renders nothing when database.postgres.url is set (bundled disabled)
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.postgres.bundled.enabled: false
      database.postgres.url: "postgres://user:pass@host:5432/db"
    asserts:
      - hasDocuments:
          count: 0

