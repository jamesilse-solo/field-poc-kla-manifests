suite: Secrets
templates:
  - secrets.yaml

tests:
  # ── Default rendering ───────────────────────────────────────────────────────

  - it: renders one Secret by default
    asserts:
      - hasDocuments:
          count: 1

  - it: is an Opaque Secret with standard name and labels
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry
      - equal:
          path: type
          value: Opaque
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: agentregistry
            app.kubernetes.io/instance: RELEASE-NAME

  - it: contains AGENT_REGISTRY_JWT_PRIVATE_KEY
    asserts:
      - isNotNull:
          path: data["AGENT_REGISTRY_JWT_PRIVATE_KEY"]

  - it: does not contain POSTGRES_PASSWORD (now in postgresql-secret.yaml)
    asserts:
      - notExists:
          path: data["POSTGRES_PASSWORD"]

  - it: base64-encodes the provided jwtPrivateKey
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
    asserts:
      - equal:
          path: data["AGENT_REGISTRY_JWT_PRIVATE_KEY"]
          # base64("deadbeef1234567890abcdef")
          value: "ZGVhZGJlZWYxMjM0NTY3ODkwYWJjZGVm"

  # ── config.existingSecret suppresses the JWT secret ──────────────────────

  - it: renders no Secret when config.existingSecret is set
    set:
      config.existingSecret: my-creds
    asserts:
      - hasDocuments:
          count: 0

