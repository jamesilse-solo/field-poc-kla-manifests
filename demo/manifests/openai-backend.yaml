# OpenAI backend for KLA demo — 2026-04-22
# Requires OPENAI_API_KEY set in the cluster as a secret.
# Run: kubectl create secret generic openai-secret -n agentgateway-system \
#        --from-literal=api-key="$OPENAI_API_KEY" --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-secret
  namespace: agentgateway-system
type: Opaque
stringData:
  # Populated by 01-setup.sh from $OPENAI_API_KEY env var
  api-key: "PLACEHOLDER_SET_BY_SETUP_SCRIPT"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: openai
  namespace: agentgateway-system
  labels:
    demo-customer: kla
spec:
  ai:
    openai:
      model: gpt-4o
      authToken:
        secretRef:
          name: openai-secret
          namespace: agentgateway-system
          key: api-key
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openai
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /openai
    backendRefs:
    - name: openai
      group: agentgateway.dev
      kind: AgentgatewayBackend
