# Keycloak JWKS backend for JWT validation
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: keycloak-jwks
  namespace: agentgateway-system
spec:
  static:
    host: keycloak.keycloak.svc.cluster.local
    port: 8080
---
# JWT authentication (Gateway-wide, Permissive mode)
# Validates JWT if present, extracts claims to headers
# Routes without JWT fall through to their own auth (basic auth on UI routes)
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: gateway-jwt-auth
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway-proxy
  traffic:
    phase: PreRouting
    jwtAuthentication:
      mode: Permissive
      providers:
      - issuer: http://keycloak.keycloak.svc.cluster.local:8080/realms/kla-demo
        jwks:
          remote:
            backendRef:
              name: keycloak-jwks
              namespace: agentgateway-system
              kind: AgentgatewayBackend
              group: agentgateway.dev
            jwksPath: realms/kla-demo/protocol/openid-connect/certs
      # Demo provider: inline JWKS for pre-minted demo tokens (Dex issuer)
      - issuer: http://dex.dex.svc.cluster.local:5556
        jwks:
          inline: |
            {"keys":[{"kty":"RSA","kid":"kla-demo-key-2026","alg":"RS256","use":"sig","n":"sGAIit8pPTHIR9IuMkS3GHLrqz3G0L-_0YhI2Dw-OtEgc-Za2xnMIQ96RibB-X1qUOhd0xKAKcXWNU6Gg41oy25kJbu2NDFjh9YB-NLncQqD0YTilTDnbq20ZjncvLTGokzWBM02_zoa6bxDPPAVLrS4Ty8ZXppA7FP6Zajfc8kgc20vb9sszxBMwx7Oi-okmWWsaJnR24RSMvhA00FuPIdC-wUI5KrxX2FFPLjWH98pTLT7zr-KEUyg4PTVr2GguM2bPMLl_Ya1509upsUsJXsAFYhgWvsR4K90kud-TjIVlshnzpmzTfLgh_uHTUU3PmwURtfjgWP_T4YfvA77Lw","e":"AQAB"}]}
    transformation:
      request:
        set:
        - name: x-user-id
          value: jwt['preferred_username']
        - name: x-user-tier
          value: jwt['tier']
        - name: x-org
          value: jwt['org']
---
# RBAC + JWT enforcement on LLM/MCP routes
# These routes REQUIRE a valid JWT (enforced via authorization)
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: llm-rbac
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: bedrock
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: mock
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: mcp
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: mcp-docs
  traffic:
    authorization:
      policy:
        matchExpressions:
        - 'jwt.org == "kla"'
