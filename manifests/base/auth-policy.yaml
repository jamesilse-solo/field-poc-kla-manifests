# Keycloak JWKS backend for JWT validation
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: keycloak-jwks
  namespace: agentgateway-system
spec:
  static:
    host: keycloak.keycloak.svc.cluster.local
    port: 8080
---
# JWT authentication on Bedrock routes
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: bedrock-jwt-auth
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: bedrock
  traffic:
    phase: PreRouting
    jwtAuthentication:
      mode: Strict
      providers:
      - issuer: http://keycloak.keycloak.svc.cluster.local:8080/realms/kla-demo
        jwks:
          remote:
            backendRef:
              name: keycloak-jwks
              namespace: agentgateway-system
              kind: AgentgatewayBackend
              group: agentgateway.dev
            jwksPath: realms/kla-demo/protocol/openid-connect/certs
    transformation:
      request:
        set:
        - name: x-user-id
          value: jwt['preferred_username']
        - name: x-user-tier
          value: jwt['tier']
        - name: x-org
          value: jwt['org']
---
