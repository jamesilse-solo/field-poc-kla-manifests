---
# RBAC on LLM routes (requires jwt.org == "kla")
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: llm-rbac
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: bedrock
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: mock
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: mcp
  traffic:
    authorization:
      policy:
        matchExpressions:
        - 'jwt.org == "kla"'
