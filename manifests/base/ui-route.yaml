apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gloo-ui
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /ui
    backendRefs:
    - name: solo-enterprise-ui
      port: 80
    timeouts:
      request: "30s"
