# Gloo UI served at root path — catches all unmatched paths
# Other routes (/argocd, /bedrock, /mock, /mcp, /keycloak, /grafana) take priority via PathPrefix
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gloo-ui
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: solo-enterprise-ui
      port: 80
    timeouts:
      request: "30s"
