apiVersion: v1
kind: Secret
metadata:
  name: demo-admin-key
  namespace: agentgateway-system
  labels:
    api-key-group: kla-demo
type: extauth.solo.io/apikey
stringData:
  api-key: sk-kla-demo-admin-2026
  x-user-id: admin
  x-user-tier: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: demo-user-key
  namespace: agentgateway-system
  labels:
    api-key-group: kla-demo
type: extauth.solo.io/apikey
stringData:
  api-key: sk-kla-demo-user-2026
  x-user-id: kla-user
  x-user-tier: standard
---
apiVersion: extauth.solo.io/v1
kind: AuthConfig
metadata:
  name: apikey-auth
  namespace: agentgateway-system
spec:
  configs:
    - apiKeyAuth:
        headerName: x-api-key
        k8sSecretApikeyStorage:
          labelSelector:
            api-key-group: kla-demo
        headersFromMetadataEntry:
          x-user-id:
            name: x-user-id
          x-user-tier:
            name: x-user-tier
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: gateway-apikey-auth
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
  traffic:
    entExtAuth:
      authConfigRef:
        name: apikey-auth
        namespace: agentgateway-system
