apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: bedrock-haiku
  namespace: agentgateway-system
spec:
  ai:
    provider:
      bedrock:
        model: anthropic.claude-3-5-haiku-20241022-v1:0
        region: us-west-2
  policies:
    auth:
      aws:
        secretRef:
          name: bedrock-secret
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: bedrock-mistral
  namespace: agentgateway-system
spec:
  ai:
    provider:
      bedrock:
        model: mistral.voxtral-mini-3b-2507
        region: us-west-2
  policies:
    auth:
      aws:
        secretRef:
          name: bedrock-secret
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: bedrock-llama3
  namespace: agentgateway-system
spec:
  ai:
    provider:
      bedrock:
        model: meta.llama3-1-8b-instruct-v1:0
        region: us-west-2
  policies:
    auth:
      aws:
        secretRef:
          name: bedrock-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bedrock
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /bedrock/haiku
    backendRefs:
    - name: bedrock-haiku
      group: agentgateway.dev
      kind: AgentgatewayBackend
    timeouts:
      request: "120s"
  - matches:
    - path:
        type: PathPrefix
        value: /bedrock/mistral
    backendRefs:
    - name: bedrock-mistral
      group: agentgateway.dev
      kind: AgentgatewayBackend
    timeouts:
      request: "120s"
  - matches:
    - path:
        type: PathPrefix
        value: /bedrock/llama3
    backendRefs:
    - name: bedrock-llama3
      group: agentgateway.dev
      kind: AgentgatewayBackend
    timeouts:
      request: "120s"
  - matches:
    - path:
        type: Exact
        value: /bedrock
    backendRefs:
    - name: bedrock-mistral
      group: agentgateway.dev
      kind: AgentgatewayBackend
    timeouts:
      request: "120s"
