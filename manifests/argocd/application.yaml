apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kla-agentgateway-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jamesilse-solo/field-poc-kla-manifests.git
    targetRevision: main
    path: manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: agentgateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
