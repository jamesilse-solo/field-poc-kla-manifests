apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agw-monitoring-manifests
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jamesilse-solo/field-poc-kla-manifests.git
    targetRevision: main
    path: manifests/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
